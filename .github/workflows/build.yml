name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os-name }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: windows-latest
            os-name: win
            arch: x64
            rid: win-x64
          - runner: ubuntu-latest
            os-name: linux
            arch: x64
            rid: linux-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore cn_metadata_exporter/cn_metadata_exporter.csproj

      - name: Build and Publish
        run: |
          dotnet publish cn_metadata_exporter/cn_metadata_exporter.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o ./temp_publish /p:PublishSingleFile=true /p:PublishReadyToRun=true

      - name: Zip Artifacts
        run: |
          7z a -tzip CNMetaExporter-${{ matrix.os-name }}-${{ matrix.arch }}.zip ./temp_publish/*

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CNMetaExporter-${{ matrix.os-name }}-${{ matrix.arch }}
          path: CNMetaExporter-${{ matrix.os-name }}-${{ matrix.arch }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
